<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かばねりちゃんすナビ（完全版）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

h1 {
  color: #ffcc00;
  margin-bottom: 20px;
}

button {
  margin: 10px;
  padding: 18px;
  font-size: 20px;
  width: 80%;
  max-width: 300px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.left { background: #3498db; }
.mid { background: #e74c3c; }
.right { background: #f39c12; }

.mode-change { 
  background: #9b59b6;
  width: auto;
  max-width: 150px;
  padding: 10px 15px;
  font-size: 16px;
}

#advice {
  font-size: 24px;
  margin-top: 20px;
  color: #00ffcc;
}

#reason {
  margin-top: 10px;
  color: #aaa;
}

#mode {
  margin-bottom: 10px;
  color: #ccc;
}
</style>
</head>

<body>

<h1>かばねりちゃんす（完全版）</h1>
<div id="mode">モード判定中...</div>
<button class="mode-change" onclick="changeMode()">モード変更</button>

<button class="left" onclick="choose('左')">左（運50%）</button>
<button class="mid" onclick="choose('中')">中（実力）</button>
<button class="right" onclick="choose('右')">右（実力）</button>

<div id="advice"></div>
<div id="reason"></div>

<script>
// モード判定（ランダムで変化）
const modes = ['左', '通常', 'チャンス', '激アツ'];
let currentMode = modes[Math.floor(Math.random() * modes.length)];
document.getElementById("mode").textContent = "現在モード：" + currentMode;

function changeMode() {
  currentMode = modes[Math.floor(Math.random() * modes.length)];
  document.getElementById("mode").textContent = "現在モード：" + currentMode;
}

function choose(userChoice) {
  let recommended;
  let reason;

  // モードによるおすすめ判定
  if (currentMode === '左') {
    // 左＝運、実力はやや低め
    recommended = Math.random() < 0.5 ? '左' : (Math.random() < 0.5 ? '中' : '右');
  } else if (currentMode === '通常') {
    recommended = Math.random() < 0.6 ? '中' : '右';
  } else if (currentMode === 'チャンス') {
    recommended = Math.random() < 0.7 ? '中' : '右';
  } else if (currentMode === '激アツ') {
    recommended = '右';
  }

  // 理由の付与
  if (recommended === '左') reason = '運ゲーで勝負！';
  else if (recommended === '中') reason = '安定実力寄り';
  else if (recommended === '右') reason = '攻めるタイミング';

  // 結果表示
  let message = (userChoice === recommended) 
      ? '👍 ナイス選択 → 『' + userChoice + '』'
      : '👉 今回は『' + recommended + '』が推奨';

  // 激アツ演出ランダム
  if (Math.random() < 0.1) message += ' 🔥激アツ!!';

  document.getElementById("advice").textContent = message;
  document.getElementById("reason").textContent = reason;

  // スマホ振動
  if (navigator.vibrate) navigator.vibrate(100);
}
</script>

</body>
</html>
