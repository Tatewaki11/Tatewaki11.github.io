<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かばねりちゃんす判断</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
}

h1 {
  color: #ffcc00;
}

button {
  margin: 10px;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  width: 80%;
  max-width: 300px;
}

.left { background: #3498db; }
.skill { background: #e74c3c; }

#result {
  margin-top: 30px;
  font-size: 22px;
  color: #00ffcc;
}

#mode {
  margin-top: 10px;
  color: #aaa;
}
</style>
</head>

<body>

<h1>かばねりちゃんす</h1>

<div id="mode">モード判定中...</div>

<button class="left" onclick="choose('左')">左（運50%）</button>
<button class="skill" onclick="choose('中右')">中右（実力）</button>

<div id="result"></div>

<script>
// モードをランダム生成（それっぽさ用）
const modes = ['通常', '高期待', 'チャンス'];
const currentMode = modes[Math.floor(Math.random() * modes.length)];

document.getElementById("mode").textContent = "現在モード：" + currentMode;

function choose(choice) {
  let recommended;

  // モードごとの判断ロジック
  if (currentMode === 'チャンス') {
    recommended = '中右'; // 強い時は実力押し
  } else if (currentMode === '高期待') {
    recommended = Math.random() < 0.7 ? '中右' : '左';
  } else {
    recommended = Math.random() < 0.5 ? '左' : '中右';
  }

  let message = '';

  if (choice === recommended) {
    message = '👍 ナイス選択！ →『' + choice + '』';
  } else {
    message = '👉 今回は『' + recommended + '』推奨';
  }

  // 激アツ演出（ランダム）
  if (Math.random() < 0.2) {
    message += ' 🔥激アツ!!';
  }

  document.getElementById("result").textContent = message;
}
</script>

</body>
</html>
