<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かばねりちゃんす攻略</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 30px;
      color: #ffcc00;
    }

    .buttons {
      display: flex;
      width: 90%;
      max-width: 400px;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 20px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #e60033;
      color: white;
    }

    button:active {
      transform: scale(0.95);
    }

    #result {
      margin-top: 30px;
      font-size: 22px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <h1>かばねりちゃんす</h1>

  <div class="buttons">
    <button onclick="choose('中')">中</button>
    <button onclick="choose('右')">右</button>
  </div>

  <div id="result"></div>

  <script>
    function choose(userChoice) {
      // ランダムでおすすめ決定
      const options = ['中', '右'];
      const recommended = options[Math.floor(Math.random() * options.length)];

      let message = '';

      if (userChoice === recommended) {
        message = '正解っぽい！👉『' + userChoice + '』';
      } else {
        message = '今回は『' + recommended + '』が良さそう';
      }

      document.getElementById("result").textContent = message;
    }
  </script>

</body>
</html>
